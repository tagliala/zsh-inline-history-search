name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zsh
        run: sudo apt-get install -y zsh

      - name: Syntax check
        run: zsh -n zsh-inline-history-search.plugin.zsh

      - name: Run tests
        run: zsh test/test_plugin.zsh
